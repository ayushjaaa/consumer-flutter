# pubspec.yaml
name: onetap365app
description: OneTap365 - Classified Ads and Services Marketplace

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.0

  # Networking
  dio: ^5.4.0

  # Map Location Picker (compatible)
  # google_maps_flutter: ^2.5.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geocoding: ^2.1.0
  location: ^5.0.3

  # Local Storage
  shared_preferences: ^2.2.2

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # UI Components
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Forms & Validation
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0

  # Image Handling
  image_picker: ^1.0.4
  image_cropper: ^11.0.0

  # OTP Input
  pinput: ^3.0.1

  # Date & Time Picker
  intl: ^0.20.2

  # Phone Number
  intl_phone_field: ^3.2.0

  # Charts (for Cash2Keys)
  fl_chart: ^0.65.0

  # File Picker
  file_picker: ^8.0.7

  # PDF Viewer
  flutter_pdfview: ^1.3.2

  # Payment Gateway
  razorpay_flutter: ^1.3.7

  firebase_core: ^3.15.0
  firebase_messaging: ^15.1.0
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logos/app_launcher.png"
